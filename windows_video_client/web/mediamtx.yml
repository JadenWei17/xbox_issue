logLevel: info
logDestinations: [stdout]
writeQueueSize: 64
udpMaxPayloadSize: 1200

rtsp: false
rtmp: false
hls: false
srt: false
playback: false
api: false
metrics: false
pprof: false

webrtc: true
webrtcAddress: :__WEBRTC_PORT__
webrtcEncryption: false
webrtcAllowOrigins: ["*"]
webrtcLocalUDPAddress: :__ICE_PORT__
webrtcLocalTCPAddress: ""
webrtcIPsFromInterfaces: true

paths:
  __STREAM_PATH__:
    source: udp+rtp://__RTP_HOST__:__RTP_PORT__
    rtpSDP: |
      v=0
      o=- 0 0 IN IP4 127.0.0.1
      s=Robot H264 Camera
      c=IN IP4 __RTP_HOST__
      t=0 0
      m=video __RTP_PORT__ RTP/AVP __PAYLOAD_TYPE__
      a=rtpmap:__PAYLOAD_TYPE__ H264/90000
      a=fmtp:__PAYLOAD_TYPE__ packetization-mode=1;profile-level-id=42e01f
